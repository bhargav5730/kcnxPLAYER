<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KCNX DIRECTORY</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #ffffff;
  }

  /* Header section with circle and title */
  .header {
    display: flex;
    align-items: center;
    padding: 20px;
    background-color: #1f1f1f;
  }

  /* Circle with KCNX */
  .circle {
    width: 60px;
    height: 60px;
    background-color: #333;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    font-size: 10px;
    font-weight: bold;
    color: #fff;
    margin-right: 20px;
    flex-shrink: 0;
  }

  /* Directory title */
  .directory-title {
    font-family: "Times New Roman", serif;
    font-size: 24px;
    margin: 0;
  }

  /* Search bar */
  .search-container {
    padding: 20px;
    background-color: #282828;
  }

  .search-box {
    width: 100%;
    max-width: 500px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    outline: none;
    font-size: 16px;
  }

  /* Song list container */
  .song-list {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Individual song box */
  .song {
    background-color: #1f1f1f;
    border-radius: 8px;
    padding: 15px 20px;
    margin-bottom: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: background-color 0.2s;
  }

  .song:hover {
    background-color: #2a2a2a;
  }

  /* Banner circle style with image */
  .banner {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: #555;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    margin-right: 15px;
  }

  /* Song info container */
  .song-info {
    flex: 1;
  }

  /* Song title style */
  .song-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 5px;
  }

  /* Artist or info text style */
  .artist-name {
    font-size: 14px;
    color: #b3b3b3;
  }

  /* Player controls area */
  .player-controls {
    display: flex;
    align-items: center;
    margin-top: 10px;
  }

  /* Control buttons styling */
  .control-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    margin-right: 15px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .control-btn:hover {
    color: #1db954; /* Spotify green */
  }

  /* Load more styling if needed */
  #playerSection {
    max-width: 700px;
    margin: 20px auto;
    padding: 10px 20px;
    background-color: #1f1f1f;
    border-radius: 8px;
  }

  /* Footer with owner info */
  .footer {
    text-align: center;
    margin: 40px 0 20px 0;
  }

  .owner-info {
    font-family: "Times New Roman", serif;
    font-size: 18px;
  }
</style>
</head>
<body>

<!-- Header with circle and directory name -->
<div class="header">
  <div class="circle">KCNX</div>
  <h2 class="directory-title">KCNX DIRECTORY</h2>
</div>

<!-- Search bar -->
<div class="search-container">
  <input type="text" class="search-box" placeholder="Search songs..." />
</div>

<!-- Song list -->
<div class="song-list" id="songs">
  <!-- Song boxes will be inserted here -->
</div>

<!-- Player section -->
<div id="playerSection" style="display:none;">
  <h3>Now Playing:</h3>
  <div id="player"></div>
  <!-- Playback controls -->
  <div class="player-controls" id="controls">
    <button class="control-btn" id="backward" title="Previous">&#9664;</button>
    <button class="control-btn" id="playpause" title="Play/Pause">&#9654;</button>
    <button class="control-btn" id="forward" title="Next">&#9654;&#9654;</button>
  </div>
</div>

<!-- Footer with owner name -->
<div class="footer">
  <div class="owner-info">
    Playlist owner: (Your Name) • VIP Member &#11088;
  </div>
</div>

<script>
  const songsData = [
    {
      title: "Daaha",
      artist: "Kumar Sanu, Alka Yagnik",
      url: "https://files.catbox.moe/xbnhk0.mp3",
      banner: "https://via.placeholder.com/60?text=Daaha"
    },
    {
      title: "Udi Udi",
      artist: "Aneesh",
      url: "https://files.catbox.moe/dp2ld1.mp3",
      banner: "https://via.placeholder.com/60?text=UdiUdi"
    },
    {
      title: "Background Music",
      artist: "",
      url: "https://files.catbox.moe/70ldzu.mp3",
      banner: "https://via.placeholder.com/60?text=Music",
      info: "This is a background music only."
    }
  ];

  const songsContainer = document.getElementById('songs');
  const playerSection = document.getElementById('playerSection');
  const playerDiv = document.getElementById('player');

  let currentSongIndex = -1;
  let audioElement = null;

  // Function to create song boxes
  function createSongBox(song, index) {
    const songDiv = document.createElement('div');
    songDiv.className = 'song';

    // Banner image inside circle
    const bannerDiv = document.createElement('div');
    bannerDiv.className = 'banner';
    bannerDiv.style.backgroundImage = `url('${song.banner}')`;

    // Info container
    const infoDiv = document.createElement('div');
    infoDiv.className = 'song-info';

    const titleDiv = document.createElement('div');
    titleDiv.className = 'song-title';
    titleDiv.innerText = song.title;

    const artistDiv = document.createElement('div');
    artistDiv.className = 'artist-name';
    if (song.artist) {
      artistDiv.innerText = song.artist;
    } else if (song.info) {
      artistDiv.innerText = song.info;
    } else {
      artistDiv.innerText = "";
    }

    infoDiv.appendChild(titleDiv);
    infoDiv.appendChild(artistDiv);

    songDiv.appendChild(bannerDiv);
    songDiv.appendChild(infoDiv);

    // Add click event to play
    songDiv.addEventListener('click', () => {
      playSong(index);
    });

    return songDiv;
  }

  // Render songs
  songsData.forEach((song, index) => {
    const songBox = createSongBox(song, index);
    songsContainer.appendChild(songBox);
  });

  // Function to load and play song
  function playSong(index) {
    currentSongIndex = index;
    const song = songsData[index];

    // Show player section
    document.getElementById('playerSection').style.display = 'block';

    // Clear previous audio
    if (audioElement) {
      audioElement.pause();
    }

    // Create new audio element
    audioElement = new Audio(song.url);
    audioElement.controls = true;
    audioElement.autoplay = true;

    // Load controls inside div
    playerDiv.innerHTML = '';
    playerDiv.appendChild(audioElement);

    // Set play/pause button
    document.getElementById('playpause').innerHTML = '&#9654;'; // play icon

    // When the audio ends, reset button
    audioElement.onended = () => {
      document.getElementById('playpause').innerHTML = '&#9654;';
    };
  }

  // Playback control buttons
  document.getElementById('playpause').addEventListener('click', () => {
    if (audioElement) {
      if (audioElement.paused) {
        audioElement.play();
        document.getElementById('playpause').innerHTML = '&#10073;&#10073;'; // pause icon
      } else {
        audioElement.pause();
        document.getElementById('playpause').innerHTML = '&#9654;'; // play icon
      }
    }
  });

  document.getElementById('backward').addEventListener('click', () => {
    if (currentSongIndex > 0) {
      playSong(currentSongIndex - 1);
    }
  });

  document.getElementById('forward').addEventListener('click', () => {
    if (currentSongIndex < songsData.length - 1) {
      playSong(currentSongIndex + 1);
    }
  });
</script>

</body>
    </html>
